name: iOS Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15 # Runner with Xcode 16/26 tools

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Run xcodebuild archive and package IPA
        working-directory: jizhang # Set working directory to the subfolder where the Xcode project lives
        run: |
          # 1. 执行正式的 Archive 归档（这样 Xcode 会生成完整的 App 结构，包含 Info.plist）
          xcodebuild archive \
            -project ./jizhang.xcodeproj \
            -scheme jizhang \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/jizhang.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

          # 2. 创建一个临时的 Payload 文件夹用来打包 IPA
          mkdir -p Payload

          # 3. 把编译出来的干净 .app 复制到 Payload 文件夹中
          cp -r build/jizhang.xcarchive/Products/Applications/jizhang.app Payload/

          # 4. 用 zip 命令压缩成可以导入全能签的纯净 .ipa 文件，输出到仓库根目录
          zip -r ../jizhang.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jizhang-pure-ipa
          path: jizhang.ipa # Uploads the jizhang.ipa located at the repository root
          if-no-files-found: error
