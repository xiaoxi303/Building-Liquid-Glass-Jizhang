name: jizhang
options:
  bundleIdPrefix: com.apple
targets:
  jizhang:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: jizhangApp.swift
      - path: Models
      - path: Views
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SDKROOT: iphoneos
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
